<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未竟之诗 - 章节列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, #f0f4ff 0%, #f5f5f5 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 24px;
            margin-bottom: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.25);
        }
        .back-link {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.9;
            display: inline-block;
            margin-bottom: 10px;
        }
        .back-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
        h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
        }
        .description {
            opacity: 0.9;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid rgba(102, 126, 234, 0.1);
        }
        .chapter-list {
            list-style: none;
        }
        .chapter-list li {
            padding: 12px 15px;
            border-bottom: 1px solid #f5f5f5;
            transition: all 0.2s;
            border-radius: 8px;
            margin-bottom: 4px;
        }
        .chapter-list li:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .chapter-list li:hover {
            background-color: #f8f9ff;
            transform: translateX(4px);
        }
        .chapter-list a {
            text-decoration: none;
            color: #333;
            display: block;
        }
        .chapter-title {
            font-weight: 500;
            font-size: 1rem;
        }
        .stats {
            color: #666;
            font-size: 0.85rem;
            margin-top: 15px;
            text-align: right;
        }
        .start-reading {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .start-reading a {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 500;
            transition: transform 0.2s;
        }
        .start-reading a:hover {
            transform: translateY(-2px);
        }
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            header {
                padding: 20px 15px;
            }
            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../index.html" class="back-link">← 返回书架</a>
            <h1>未竟之诗</h1>
            
            <p class="description">世人皆知，魔法是神明赐予的神圣之力，唯有恪守神谕的天选者才能掌控，唯有登顶力量之巅才能封神。而被世界规则排斥的艾拉，是创世神弃坑时删掉的「原初勇者」，她能看见所有被遗弃的叙事碎片，听见被遗忘者的低语。她不抢神器不刷副本，只给被主线抛弃的角色写结局，却被世界的「叙事校对者」一路追杀。可当教会为了所谓的完美世界，要唤醒创世神留下的终末自毁程序时，整个世界才发现，唯一能拯救他们的，正是这个被他们视为异端的「废弃设定」。</p>
            
        </header>

        <div class="section">
            <ul class="chapter-list">
                
            </ul>
            <div class="stats">共 0 章</div>
            
        </div>
    </div>
</body>
</html>
