core_hook: 程序员穿越修仙世界，用调试系统修补天道漏洞。
core_requirement: 故事要结合程序员思维和玄幻修仙设定，形成差异化爽点。主角周言不是传统天才，而是擅长观察规则、分析异常、利用系统机制破局。前期从小宗门杂役或外门弟子开始，通过修复低级功法漏洞、灵田灵气紊乱、阵法错误等事件获得成长；中期进入宗门斗争、秘境探索和王朝修仙界；后期揭开天道系统、飞升真相和世界本源。系统不要过度万能，最好有权限限制、能量消耗和误判风险。人物关系可以包括冷静强大的师姐、表面吊儿郎当实则深藏秘密的师父、与主角理念冲突的天才对手。整体风格可以轻松幽默，但主线要有逐渐加深的世界危机感。
