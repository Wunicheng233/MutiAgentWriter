novel_description: 前世的林澈出身普通，却因识人不清、错失机遇，最终事业失败、亲情疏远、爱情破裂。一次意外后，他重生回到高考前夕。面对曾经看不起他的亲戚、背叛他的朋友，以及错过的时代风口，他决定不再做被命运推着走的人。这一世，他要弥补亲情遗憾，守护真正爱他的人，并从校园开始布局互联网创业，一步步建立属于自己的商业帝国。
