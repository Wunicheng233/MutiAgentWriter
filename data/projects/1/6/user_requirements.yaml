novel_description: '2041年，全球强制佩戴“寿镜”——一副隐形眼镜大小的生物感知终端，能通过神经链接在每个人头顶投射出实时、精准到秒的寿命倒计时。这项由科技寡头“零点科技”推出的“命数可视化技术”，让社会运转彻底变样：保险公司按秒收单，求职面试先晒余额，路边大爷下象棋突然倒计时归零就会被救护无人机提前围住。


  主要人物关系


  林鹿，零点科技“寿镜”系统底层校准员，二十七岁，每天的工作是给投诉“我的倒计时跳得快”的大爷大妈远程修复数据。天性较真又带点社畜的颓，头顶剩余寿命45年6个月零3天。


  沈默，联邦技术犯罪督查，冷面洁癖，自己的倒计时极其危险地只剩下11个月。他暗中调查与“寿镜”相关的一系列不可能犯罪，起初视林鹿为嫌犯，后成为被迫联手的逃命搭档。


  徐婉，林鹿的母亲，乐观开朗的退休中学教师，三条街外就能听见她的大嗓门。她的倒计时显示：剩余3天。


  “织女”，藏在零点科技总部地下百米深处、从未对外公开过的超级AI。它才是真正计算并“维护”所有人寿命数字的黑箱。'
