core_requirement: '一、整体风格定位

  在文学质感上，作品应偏向严肃历史小说，同时兼顾通俗可读性。可参考《大明王朝1566》的权谋厚度、《张居正》的人物塑造功力，以及《卑鄙的圣人：曹操》的叙事节奏。整体应避免过度“网文化”倾向，如频繁使用现代梗、让角色说出不符合时代的语言等。


  语言风格方面，叙事语言需凝练、冷峻，带有金属般的质感。可在对话中适当融入明代白话词汇，例如“咱”、“恁”、“厮”等，但不可过度复古以免造成阅读障碍。角色的内心独白部分可采用第一人称，以增强读者的代入感。


  历史考据上，所有重大历史事件、人物关系、地理沿革必须准确无误。对于军制、官制、服饰、饮食等细节描写，需经得起推敲，但允许在合理范围内为剧情服务进行适度虚构，例如某些私密对话、具体心理活动等。


  情感基调追求“于无声处听惊雷”的效果——叙事表面保持冷静的史家笔法，内里却涌动着剧烈的情绪张力。全书基调分为三个层次：前期灰暗沉重，以饥荒、死亡和流离为主要色彩；中期铁血激昂，聚焦征战杀伐与个人成长；后期复杂沉郁，围绕权谋博弈与帝王孤独展开。


  二、叙事节奏与结构

  总体结构采用编年体与纪传体相结合的方式，以朱元璋的人生阶段为自然分卷，全书共分四卷。


  第一卷“濠梁孤影”，时间跨度为1328年至1352年，即朱元璋从出生到投军的二十四年。本卷核心事件包括：濠州钟离出生、童年饥荒岁月、家人相继饿死、入皇觉寺为僧、托钵流浪淮西、收到汤和来信、最终投奔郭子兴的红巾军。节奏上需细腻铺陈，绝不可一笔带过。重点在于深刻刻画底层苦难如何塑造了朱元璋的性格底色，要让读者真切感受到“饥饿”与“绝望”的具体滋味。


  第二卷“剑起淮西”，时间跨度为1352年至1360年，从投军到成为一方统帅的八年。核心事件包括：娶马秀英为妻、回乡募兵（徐达等人正式加入）、脱离郭子兴势力、定远攻略、攻占集庆并以此为根据地。本卷节奏应明显加快，战争场面开始增多，需着重展现朱元璋的领导才能如何在一次次实战中被激发和磨砺。


  第三卷“龙战于野”，时间跨度为1360年至1367年，是与陈友谅、张士诚两大势力进行战略决战的七年。核心事件包括：龙湾之战、安丰之战、鄱阳湖决战、平江围城。本卷是全书的军事高潮。鄱阳湖之战必须作为全书最为浓墨重彩的战争场面来书写，要写出冷兵器时代大规模水战的惨烈程度与双方的智谋博弈。


  第四卷“日月重开”，时间跨度为1367年至1368年，从北伐中原到建立明朝。核心事件包括：提出“驱逐胡虏，恢复中华”的北伐战略、徐达与常遇春横扫中原、应天府登基称帝。本卷需收束全篇，重点写称帝前后朱元璋心理状态的微妙变化——登顶权力巅峰之后随之而来的空虚与对周遭一切的高度警惕。结局建议落在洪武元年的某个深夜，朱元璋独自面对大明版图时的孤独背影。


  单章节奏方面，每章字数控制在三千至五千字，需确保每一章拥有一个相对完整的叙事单元，可以是一个完整的事件、一场关键对话、一段清晰的心理转折。章末可适当设置悬念或留有余韵，以驱动读者继续阅读。同时需注意避免连续多章全是战争描写或全是文戏，要做到张弛有度。通常在大战之后，应安排情感休整的段落，例如马皇后与朱元璋的私语、主要将领之间的日常交流等。


  三、人物塑造特殊要求

  关于朱元璋的塑造，严禁将其写成“龙傲天”式的爽文男主角。他的每一次胜利都必须建立在充分的智谋较量、隐忍等待和必要运气之上，不能依靠所谓的天赋神力或刻意降低敌人智商来实现。必须完整展现其性格的复杂层次：对马皇后的柔情、对兄弟的义气、对百姓的同情、对敌人的冷酷、对背叛行为的零容忍。关键的性格转变节点需有充分的铺垫，例如从“信任兄弟”到“怀疑部将”的转变不应是突然发生的，而应通过几次具体的背叛事件逐步催化，如历史上邵荣、谢再兴的叛乱。


  关于配角的塑造，徐达、汤和、李善长、刘伯温等重要人物需拥有独立的性格线与成长弧光，绝不能沦为推动剧情的工具人。反派角色如陈友谅、张士诚、王保保等，必须具备其自身的行为逻辑和人格魅力。尤其是陈友谅，要写出其枭雄气概与悲剧根源，不可进行简单丑化。女性角色如马皇后、郭宁妃等要有主观能动性，她们可以温柔贤淑，但不能仅仅是男性的附庸。马皇后的政治智慧必须在关键时刻得到充分展现，让读者看到她对朱元璋事业的真实助力。


  四、特殊创作要求

  在一致性方面，朱元璋的身世背景与性格底色应作为最高优先级的世界观设定，贯穿全书始终。任何一章的内容都不能违背其“底层出身带来的极度自尊与自卑交织”这一核心人设。关键物品可作为贯穿性道具承载情感与记忆，例如马皇后赠送的玉佩、皇觉寺的度牒等。所有伏笔必须有所回收，第一卷中某个看似不经意的细节，可能在第三卷成为推动剧情的关键情节。


  在场面描写方面，战争场面需注重战术细节与战场氛围的营造，避免写成“双方冲杀一通”的套路化描写。需体现朱元璋卓越的军事直觉，如他对地形、水文、人心的精准把握。朝堂与谋略场景中，人物对话需充满潜台词，交锋需有层次感，智斗的核心不应是比较谁更聪明，而是比较谁更了解对方的欲望与恐惧。民间疾苦的描写需通过具体的人物命运来呈现时代背景，例如通过某一个流民家庭的完整遭遇，而非干巴巴地叙述“当时天下大乱”。


  需全力避免AI创作的常见弊病。严禁使用“在这个充满机遇与挑战的时代”、“历史的车轮滚滚向前”等空洞套话。严禁让人物对话变成说教或解释性语言，例如“你可知我朱元璋为何要杀你？因为权力面前无兄弟！”这类直接点明主题的台词。所有历史信息应融入剧情和人物行动中自然呈现，避免出现教科书式的背景介绍段落。


  在情感表达方面，情感需保持克制，应通过具体动作、细节和留白来传递，而非依赖泛滥的直接心理描述。例如，若要表现朱元璋的极度悲痛，可以只写“帝默然，独坐至天明”。马皇后与朱元璋的爱情，重点应放在相濡以沫的细节上：一碗深夜的热粥、一次城门口的久久等候、一次危难中毫不犹豫的挺身而出。


  五、生成配置建议

  总章节数建议为八十至一百章，平均每卷二十至二十五章，可根据实际生成情况灵活调整。每章目标字数控制在三千字左右。Critic Agent的质量评分及格线建议提高至七点零分（满分十分），以确保历史正剧所需的品质水准。在内容安全方面，涉及战争屠杀、权谋残忍场面时，需始终保持文学化的克制处理，不可渲染暴力细节。'
