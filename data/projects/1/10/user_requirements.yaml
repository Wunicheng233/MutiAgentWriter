core_hook: 整座城市被困在同一天，每次循环都会有人永久消失。
core_requirement: 故事重点是悬疑推进和群像关系。主角许知远是心理医生，擅长观察人的谎言、创伤和动机，但他自身也有记忆缺口。每次循环都应揭露新的线索，同时改变人物之间的信任关系。主要人物可以包括刑警队长、失踪少女、天才高中生、神秘研究员、网络主播、外卖员等，他们各自掌握一部分真相，也各自有不能说的秘密。前期营造诡异循环和失踪危机；中期围绕城市地下实验室、未来信息和人物背叛展开；后期揭露循环目的，并让主角在“拯救所有人”和“牺牲少数人换取未来”之间做选择。风格应偏冷峻、紧张、电影感强，避免过早解释全部设定。
