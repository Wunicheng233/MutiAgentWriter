novel_description: 一座沿海城市在某天凌晨 3:17 被神秘白光吞没。心理医生许知远醒来后发现，城市中的一部分人被困在同一天不断循环。每次循环结束，都会有人彻底消失，而留下的人会逐渐记起更多真相。随着调查深入，许知远发现循环并非灾难，而是一场筛选：城市地下隐藏着一台来自未来的意识实验装置，它正在从无数次重复中寻找一个能够阻止未来毁灭的人。
