server {
    listen 80;
    server_name _;

    # ---------- 前端静态文件 ----------
    root /root/MultiAgentWriter/frontend/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ---------- API 反向代理 ----------
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（AI 生成可能较慢）
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # WebSocket 代理（如果后端有 websocket 需求）
    location /ws/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # ---------- SPA 路由兜底 ----------
    # 所有非文件请求都返回 index.html（让 React Router 处理路由）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- 静态资源缓存 ----------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问 . 开头的隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 日志
    access_log /var/log/nginx/storyforge-access.log;
    error_log  /var/log/nginx/storyforge-error.log;
}
