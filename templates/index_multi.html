<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多Agent小说创作系统 - 我的书架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, #f0f4ff 0%, #f5f5f5 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        header {
            text-align: center;
            color: #2d3748;
            padding: 40px 20px 30px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #718096;
            font-size: 0.95rem;
        }
        .novel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .novel-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            border: 1px solid rgba(102, 126, 234, 0.1);
        }
        .novel-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.3);
        }
        .novel-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }
        .novel-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }
        .novel-desc {
            color: #718096;
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .novel-meta {
            color: #a0aec0;
            font-size: 0.8rem;
            padding-bottom: 16px;
        }
        .read-btn {
            text-align: center;
        }
        .read-btn a {
            display: block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .read-btn a:hover {
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #a0aec0;
            background: white;
            border-radius: 16px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 20px 12px;
            }
            header {
                padding: 20px 10px;
            }
            h1 {
                font-size: 1.6rem;
            }
            .novel-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 我的小说书架</h1>
            <p>多Agent自动创作 · 在线阅读</p>
        </header>

        {% if novels %}
            {% for novel in novels %}
            <div class="novel-card">
                <div class="novel-icon">📖</div>
                <div class="novel-title">{{ novel.name }}</div>
                {% if novel.description %}
                <div class="novel-desc">{{ novel.description }}</div>
                {% endif %}
                <div class="novel-meta">
                    <span>已生成 {{ novel.chapter_count }} 章</span>
                </div>
                <div class="read-btn">
                    <a href="/novel/{{ novel.dir_name }}">开始阅读</a>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="empty-state">
                <p>还没有生成任何小说，请先运行 python main.py 开始创作</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
