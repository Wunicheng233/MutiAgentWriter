novel_name: “完美犯罪培训班”
novel_description: 失业青年阿强在网上看到一则广告：“完美犯罪培训班，包教包会，学不会全额退款。”他交了999元学费，学完了第一课。后来他成了这个培训班的讲师。有人问他秘诀，他笑着说：“你永远猜不到，最后一课的作业是什么。”
core_requirement:
  1. 开篇：阿强刷到广告，交钱上课，快节奏展示第一课“偷自己东西骗保”；
  2. 第一波转折：阿强实践后被抓，出狱退款被拒并被威胁，发现培训班是骗局；
  3. 第二波转折：老师提出“加盟模式”，阿强从受害者变成加害者，开始发展下线；
  4. 核心反转：阿强被一个“学员”反敲诈，对方亮出他当年的案底，最后揭露对方就是最初那个老师换马甲，形成闭环；
  5. 欧亨利式结尾：老师用同一套模式二次收割阿强，完美犯罪培训班从未失败，只是换了一个又一个“学员”成为新的猎物；
  6. 全篇约1.5万字，分6章，每章结尾留钩子；
  7. 黑色幽默核心：讽刺传销式骗局和人性贪婪，你以为是传承，其实是循环收割。
target_platform: “番茄免费小说”

# 5. 单章字数（必填）
chapter_word_count: 2000

# 6. 章节生成范围（必填）
# 提示：设置 start_chapter: 0 会自动检测已有章节，从下一章节开始续写
start_chapter: 1
end_chapter: 6

# 7. 是否跳过人工确认策划方案（可选，true/false，默认false）
# true = 跳过确认直接生成，false = 生成后让你确认满意了再继续
skip_plan_confirmation: true

# 8. 是否跳过章节级人工确认（可选，true/false，默认false）
# true = 跳过确认全自动生成，false = 每章生成完展示预览，你确认满意了再继续
skip_chapter_confirmation: true

# 9. 是否允许人工调整后续剧情节点（可选，true/false，默认false）
# 如果开启，每章完成后你可以修改下一章的剧情走向，实现人在环路创作
allow_plot_adjustment: false

# 10. 是否生成完成后自动导出静态网站并推送到GitHub（可选，true/false，默认false）
auto_export_static: true

# 11. 是否直接使用用户自己的策划大纲
use_user_description_as_plan: false