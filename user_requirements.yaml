novel_name: 江湖诛心铺
novel_description: 江湖第一唇枪“金不换”金盆洗手后，开了一家铺子，专替人了结恩怨。不杀人，不伤人，只动口。生意火爆，从丐帮到少林排着队。直到某天，一桩大买卖找上门——客户是当朝公主，目标是武林盟主。金不换接了。三日后，盟主退位。又三日，全江湖都在追杀金不换。他逃进一座破庙，望着追兵，提笔写下了一封“道歉信”。信送出后，公主哭了，盟主笑了，而金不换的铺子收到一笔神秘巨款，附言：“诛心之笔，名不虚传。再写一封，价钱翻倍。”
core_requirement:
  1. 开篇快节奏：金不换金盆洗手，开“诛心铺”，用2-3个荒诞案例展示“唇枪舌剑”的杀伤力（如：骂哭铁掌帮帮主、讥讽到峨眉师太还俗、一封书信让江南首富闭门思过）；
  2. 第一波转折：接到公主订单，目标武林盟主。金不换撰写“诛心帖”，盟主三日后退位；
  3. 第二波转折：公主翻脸，反诬金不换暗杀盟主，全江湖追杀他。金不换发现盟主并非退位而是暴毙，自己被设计成替罪羊；
  4. 核心反转：金不换绝境中写下“道歉信”，表面认错，实则将公主的阴谋、各大门派丑事全部隐晦披露。信传遍江湖后，公主身败名裂，各派内斗。而神秘巨款来自盟主之子——他早欲篡位，借金不换之手除掉父亲；
  5. 欧亨利式结尾：金不换明知被利用，却淡然一笑，因为铺子又接到新订单。他提笔蘸墨，对着镜中自己写下第一句：“你呀你，这辈子就输在一张嘴上。”然后寄出，收件人：金不换本人；
  6. 全篇8章，约1.6万字，每章穿插一封“书信”或“口录”，增加古风韵味；
  7. 武侠+黑色幽默+反转，核心讽刺江湖虚伪、权力肮脏，以及“言语杀人”的双刃剑。主角无武功，单凭文采与口才纵横江湖。
target_platform: “番茄免费小说”

# 5. 单章字数（必填）
chapter_word_count: 2000

# 6. 章节生成范围（必填）
# 提示：设置 start_chapter: 0 会自动检测已有章节，从下一章节开始续写
start_chapter: 7
end_chapter: 8

# 7. 是否跳过人工确认策划方案（可选，true/false，默认false）
# true = 跳过确认直接生成，false = 生成后让你确认满意了再继续
skip_plan_confirmation: true

# 8. 是否跳过章节级人工确认（可选，true/false，默认false）
# true = 跳过确认全自动生成，false = 每章生成完展示预览，你确认满意了再继续
skip_chapter_confirmation: true

# 9. 是否允许人工调整后续剧情节点（可选，true/false，默认false）
# 如果开启，每章完成后你可以修改下一章的剧情走向，实现人在环路创作
allow_plot_adjustment: false

# 10. 是否生成完成后自动导出静态网站并推送到GitHub（可选，true/false，默认false）
auto_export_static: true

# 11. 是否直接使用用户自己的策划大纲
use_user_description_as_plan: false